<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Програмна система «Готель»</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Програмна система «Готель»</h1>
        <p>Навчальний прототип системи для пошуку та бронювання номерів</p>
    </header>

    <main>
        <section class="card">
            <h2>Статистика готелю</h2>
            <div class="stats">
                <div class="stat-item">
                    <h3>Усього номерів</h3>
                    <p id="totalRooms">0</p>
                </div>
                <div class="stat-item">
                    <h3>Вільні</h3>
                    <p id="freeRooms">0</p>
                </div>
                <div class="stat-item">
                    <h3>Заброньовані</h3>
                    <p id="reservedRooms">0</p>
                </div>
                <div class="stat-item">
                    <h3>Зайняті</h3>
                    <p id="occupiedRooms">0</p>
                </div>
                <div class="stat-item">
                    <h3>Бронювання</h3>
                    <p id="bookingCount">0</p>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Пошук номерів</h2>
            <div class="search-panel">
                <input type="text" id="searchInput" placeholder="Введіть тип номера">
                <select id="statusFilter">
                    <option value="all">Усі номери</option>
                    <option value="Вільний">Вільні</option>
                    <option value="Заброньований">Заброньовані</option>
                    <option value="Зайнятий">Зайняті</option>
                </select>
                <button onclick="searchRooms()">Пошук</button>
                <button onclick="resetSearch()">Скинути</button>
            </div>
        </section>

        <section class="card">
            <h2>Список номерів</h2>
            <div id="roomsList" class="rooms-list"></div>
        </section>

        <section class="card">
            <h2>Бронювання номера</h2>
            <form id="bookingForm">
                <label for="clientName">Ім'я клієнта:</label>
                <input type="text" id="clientName" required>

                <label for="clientPhone">Номер телефону:</label>
                <input type="text" id="clientPhone" required>

                <label for="clientEmail">Email клієнта:</label>
                <input type="email" id="clientEmail" required>

                <label for="roomNumber">Номер кімнати:</label>
                <select id="roomNumber" required></select>

                <label for="checkIn">Дата заїзду:</label>
                <input type="date" id="checkIn" required>

                <label for="checkOut">Дата виїзду:</label>
                <input type="date" id="checkOut" required>

                <button type="submit">Забронювати</button>
            </form>
        </section>

        <section class="card">
            <h2>Список бронювань</h2>
            <div id="bookingsList" class="bookings-list"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
