<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Програмна система «Готель»</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>Програмна система «Готель»</h1>
        <p>Навчальний прототип системи для пошуку та бронювання номерів</p>
    </header>

    <main class="container">

        <section class="section">
            <h2>Статистика готелю</h2>
            <div id="statistics" class="stats-grid"></div>
        </section>

        <section class="section">
            <h2>Пошук номерів</h2>

            <div class="filters">
                <input type="text" id="searchInput" placeholder="Введіть тип номера">

                <select id="statusFilter">
                    <option value="all">Усі номери</option>
                    <option value="Вільний">Тільки вільні</option>
                    <option value="Заброньований">Заброньовані</option>
                    <option value="Зайнятий">Зайняті</option>
                </select>

                <button onclick="filterRooms()">Пошук</button>
                <button onclick="resetFilters()">Скинути</button>
            </div>
        </section>

        <section class="section">
            <h2>Список номерів</h2>
            <div id="roomsList" class="rooms-list"></div>
        </section>

        <section class="section">
            <h2>Бронювання номера</h2>

            <form id="bookingForm" class="booking-form">
                <label for="clientName">Ім'я клієнта:</label>
                <input type="text" id="clientName" required>

                <label for="clientPhone">Номер телефону:</label>
                <input type="text" id="clientPhone" required>

                <label for="clientEmail">Email клієнта:</label>
                <input type="email" id="clientEmail" required>

                <label for="checkInDate">Дата заїзду:</label>
                <input type="date" id="checkInDate" required>

                <label for="checkOutDate">Дата виїзду:</label>
                <input type="date" id="checkOutDate" required>

                <label for="roomNumber">Номер кімнати:</label>
                <input type="number" id="roomNumber" required>

                <button type="submit">Забронювати</button>
            </form>
        </section>

        <section class="section">
            <h2>Список бронювань</h2>
            <div id="bookingsList" class="bookings-list">
                <p>Поки що бронювань немає.</p>
            </div>
        </section>

    </main>

    <footer class="footer">
        <p>Навчальний проєкт з дисципліни «Аналіз вимог до програмного забезпечення»</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
